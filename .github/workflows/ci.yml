name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts:
    name: TS app + lib · lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  mcp:
    name: Bazaar MCP servers · typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - working-directory: services/mcp
        run: npm install
      - working-directory: services/mcp
        run: npm run typecheck

  escrow:
    name: LDGR escrow · fmt · clippy · check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: programs/ldgr
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: programs/ldgr
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo check --all-targets

  python:
    name: lila-bot · ruff · pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff pytest
      - run: ruff check services/lila-bot
      - working-directory: services/lila-bot
        run: python -m pytest tests/ -q
        env:
          PYTHONPATH: .
