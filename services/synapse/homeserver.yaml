## The Bazaar — Synapse config.
##
## Private homeserver. No federation. Admin-only registration. E2EE on by
## default. Lila is the sole admin user. Operator creates all accounts via
## the admin API (see services/synapse/README.md).
##
## Values are templated for Railway — placeholders ${VAR} are resolved by
## envsubst on container start (see Dockerfile in this dir).

server_name: "${SYNAPSE_SERVER_NAME}"
pid_file: /data/homeserver.pid
public_baseurl: "${SYNAPSE_PUBLIC_BASEURL}"

# ─── Listeners ─────────────────────────────────────────────────────────────
listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    bind_addresses: ['0.0.0.0']
    resources:
      - names: [client]
        compress: false
      # federation listener intentionally absent

# ─── Database ─────────────────────────────────────────────────────────────
# Synapse uses its own logical Postgres database alongside Lila's.
database:
  name: psycopg2
  args:
    user: "${PGUSER}"
    password: "${PGPASSWORD}"
    database: "${SYNAPSE_DB:-synapse}"
    host: "${PGHOST}"
    port: "${PGPORT:-5432}"
    cp_min: 1
    cp_max: 5
    sslmode: require

# ─── Federation: OFF ──────────────────────────────────────────────────────
federation_domain_whitelist: []
federation_metrics_domains: []
allow_public_rooms_over_federation: false
allow_per_room_profiles: false

# ─── Registration: closed ─────────────────────────────────────────────────
enable_registration: false
enable_registration_without_verification: false
registration_requires_token: true
registrations_require_3pid: []

# ─── E2EE: forced on ──────────────────────────────────────────────────────
encryption_enabled_by_default_for_room_type: all
require_membership_for_aliases: true
allow_guest_access: false

# ─── Admins ───────────────────────────────────────────────────────────────
# Lila bot has admin power on the homeserver. The operator account
# (@operator:${SYNAPSE_SERVER_NAME}) is created via the admin API and granted
# admin via the user-admin endpoint on first boot.
admin_contact: "mailto:${SYNAPSE_ADMIN_CONTACT_EMAIL:-admin@example.com}"

# ─── Retention (default policy) ───────────────────────────────────────────
# Negotiation rooms expire 30 days after creation by default. Skills board
# and archive rooms override this via per-room policy events.
retention:
  enabled: true
  default_policy:
    min_lifetime: 1d
    max_lifetime: 30d
  allowed_lifetime_min: 1d
  allowed_lifetime_max: 365d
  purge_jobs:
    - shortest_max_lifetime: 1d
      longest_max_lifetime: 31d
      interval: 1d

# ─── Media ────────────────────────────────────────────────────────────────
media_store_path: /data/media_store
max_upload_size: 50M
url_preview_enabled: false
enable_media_repo: true

# ─── Macaroon/secrets ─────────────────────────────────────────────────────
macaroon_secret_key: "${MACAROON_SECRET_KEY}"
form_secret: "${FORM_SECRET}"
signing_key_path: "/data/signing.key"
report_stats: false

# ─── Rate limiting ────────────────────────────────────────────────────────
rc_message:
  per_second: 0.5
  burst_count: 10
rc_login:
  address:
    per_second: 0.2
    burst_count: 5
  account:
    per_second: 0.2
    burst_count: 5

# ─── Logging ──────────────────────────────────────────────────────────────
log_config: "/data/log.yaml"

# ─── App-service registrations (none — Lila bot uses a regular user) ─────
app_service_config_files: []

# ─── Captcha / 3PID / SSO: disabled ───────────────────────────────────────
enable_3pid_lookup: false
password_config:
  enabled: true
  pepper: "${PASSWORD_PEPPER}"
